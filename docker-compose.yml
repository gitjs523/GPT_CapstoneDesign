services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-snow}
      POSTGRES_USER: ${POSTGRES_USER:-snow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snow-dev-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-snow} -d ${POSTGRES_DB:-snow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SERVER_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-snow}
      POSTGRES_USER: ${POSTGRES_USER:-snow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snow-dev-password}
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  postgres-data:
