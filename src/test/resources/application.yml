spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

  sql:
    init:
      mode: never

  ai:
    model:
      chat: ollama
      embedding: ollama
    ollama:
      base-url: ${OLLAMA_CHAT_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:qwen3:4b-q4_K_M}
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:qwen3-embedding:0.6b}

ollama:
  embedding:
    url: ${OLLAMA_EMBEDDING_URL:http://localhost:11434}
    model: ${OLLAMA_EMBEDDING_MODEL:qwen3-embedding:0.6b}
    batch-size: ${OLLAMA_EMBEDDING_BATCH_SIZE:20}
    connect-timeout-seconds: ${OLLAMA_EMBEDDING_CONNECT_TIMEOUT:5}
    read-timeout-seconds: ${OLLAMA_EMBEDDING_READ_TIMEOUT:30}

cloud:
  aws:
    region: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${S3_BUCKET_NAME:test-bucket}

auth:
  jwt:
    issuer: snow-test
    access-token-secret: test-access-token-secret-which-is-long-enough-for-hmac
    access-token-expiration-seconds: 900
  refresh-token:
    expiration-seconds: 1209600
    cookie:
      name: snow_refresh
      secure: false
      same-site: Lax
      path: /api/auth
      domain:
